<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Keys | v2</title>
    <style>
        :root {
            --bg: #0a0a14;
            --surface: #16162a;
            --primary: #a855f7;
            --primary-glow: #c084fc;
            --accent: #22c55e;
            --accent-glow: #4ade80;
            --text: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #2e2e4a;
            --radius: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(168, 85, 247, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(34, 197, 94, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }

        .glass-card {
            background: rgba(22, 22, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 44px 36px;
            box-shadow:
                0 20px 50px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            width: 100%;
            max-width: 480px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-card:hover {
            box-shadow:
                0 25px 60px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 0 80px rgba(168, 85, 247, 0.15);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(168, 85, 247, 0.15);
            border: 1px solid rgba(168, 85, 247, 0.25);
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #c084fc;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #e9d5ff, #c084fc, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.5));
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 32px;
            font-weight: 400;
        }

        .key-display {
            background: rgba(0, 0, 0, 0.5);
            border: 2px dashed var(--border);
            border-radius: 20px;
            padding: 26px 18px;
            margin-bottom: 28px;
            min-height: 88px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .key-display.active {
            border-color: var(--primary);
            border-style: solid;
            box-shadow: 0 0 30px rgba(168, 85, 247, 0.3), inset 0 0 20px rgba(168, 85, 247, 0.05);
            background: rgba(0, 0, 0, 0.65);
        }

        .key-text {
            font-size: 1.9rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            color: var(--accent);
            text-shadow: 0 0 25px rgba(34, 197, 94, 0.7);
            letter-spacing: 0.5px;
            transition: opacity 0.12s ease, transform 0.12s ease;
            word-break: break-all;
        }

        .key-text.fade-out {
            opacity: 0;
            transform: scale(0.92);
        }

        .key-text.placeholder {
            color: #5b5b76;
            text-shadow: none;
            font-size: 1.1rem;
            font-weight: 400;
            font-style: italic;
            letter-spacing: 0;
        }

        .button-group {
            display: flex;
            gap: 14px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 28px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            outline: none;
            position: relative;
            font-family: inherit;
        }

        .btn-generate {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.45);
            flex: 1.2;
            min-width: 160px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-generate:hover {
            background: linear-gradient(135deg, #8b5cf6, #c084fc);
            box-shadow: 0 14px 35px rgba(124, 58, 237, 0.65);
            transform: translateY(-3px);
        }
        .btn-generate:active {
            transform: translateY(0px) scale(0.97);
        }

        .btn-copy {
            background: rgba(255, 255, 255, 0.03);
            color: #e2e8f0;
            border: 1px solid var(--border);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-width: 130px;
            backdrop-filter: blur(8px);
        }

        .btn-copy:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.35);
            color: white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }

        .btn-copy:active {
            transform: translateY(0px) scale(0.97);
        }

        .btn-copy.copied {
            background: #16a34a;
            border-color: #22c55e;
            color: white;
            box-shadow: 0 0 35px rgba(34, 197, 94, 0.7);
            transition: 0.2s;
        }

        .btn-copy.copied:hover {
            background: #22c55e;
            box-shadow: 0 0 45px rgba(34, 197, 94, 0.8);
        }

        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.4);
        }

        @media (max-width: 500px) {
            .glass-card {
                padding: 30px 20px;
            }
            .key-text {
                font-size: 1.4rem;
            }
            .btn {
                padding: 14px 20px;
                font-size: 0.95rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="badge">
            <span>🔐</span> opa mano d boa? ENTÃO o meu zap tomou ban eu não dei golpe se wuiser falar comigo chama no insta
        </div>
        <h1>Gerador</h1>
        <p class="subtitle">real.mestrexit</p>

        <div class="key-display" id="keyDisplay">
            <span id="keySpan" class="key-text placeholder">te aguardo...</span>
        </div>

        <div class="button-group">
            <button class="btn btn-generate" id="btnGenerate" onclick="generateKey()">
                <span>⚡</span> <span id="btnGenerateText">Gerar Key</span>
            </button>
            <button class="btn btn-copy" id="btnCopy" onclick="copyKey()">
                <span id="copyIcon">📋</span> <span id="copyText">Copiar</span>
            </button>
        </div>
    </div>

    <script>
        (function() {
            // Lista completa das chaves fornecidas
            const keys = [
                "chave-1259", "chave-7870", "chave-9192", "chave-4837", "chave-1508",
                "chave-7264", "chave-3319", "chave-8451", "chave-6027", "chave-1745",
                "chave-9583", "chave-4126", "chave-7801", "chave-2368", "chave-5940",
                "chave-8672", "chave-1094", "chave-7153", "chave-4489", "chave-9821",
                "chave-3046", "chave-5778", "chave-8904", "chave-1623", "chave-7359",
                "chave-2417", "chave-6580", "chave-9976", "chave-1854", "chave-4209",
                "chave-8735", "chave-1168", "chave-5502", "chave-6921", "chave-3840",
                "chave-7485", "chave-2671", "chave-9314", "chave-5097", "chave-1432",
                "chave-8760", "chave-6258", "chave-2973", "chave-8146", "chave-4705",
                "chave-3518", "chave-9082", "chave-5326", "chave-2794", "chave-6643"
            ];

            let currentKey = null;
            let copyTimeout = null;

            // Elementos do DOM
            const keySpan = document.getElementById('keySpan');
            const keyDisplay = document.getElementById('keyDisplay');
            const btnGenerateText = document.getElementById('btnGenerateText');
            const btnCopy = document.getElementById('btnCopy');
            const copyIcon = document.getElementById('copyIcon');
            const copyText = document.getElementById('copyText');

            // Função para gerar nova chave
            window.generateKey = function() {
                // Efeito de fade out se já existe chave
                if (currentKey) {
                    keySpan.classList.add('fade-out');
                    setTimeout(() => {
                        setNewRandomKey();
                        keySpan.classList.remove('fade-out');
                    }, 100);
                } else {
                    setNewRandomKey();
                }

                // Altera texto do botão após primeira geração
                if (btnGenerateText.textContent === 'Gerar Key') {
                    btnGenerateText.textContent = 'Gerar Outra';
                }
            };

            function setNewRandomKey() {
                const randomIndex = Math.floor(Math.random() * keys.length);
                currentKey = keys[randomIndex];
                keySpan.textContent = currentKey;
                keySpan.classList.remove('placeholder');
                keyDisplay.classList.add('active');
                resetCopyButton();
            }

            // Função robusta de cópia com fallback para textarea
            window.copyKey = function() {
                if (!currentKey) {
                    // Feedback amigável quando não há chave
                    copyIcon.textContent = '⚠️';
                    copyText.textContent = 'Gere uma key';
                    btnCopy.classList.add('copied');
                    if (copyTimeout) clearTimeout(copyTimeout);
                    copyTimeout = setTimeout(() => {
                        resetCopyButton();
                    }, 1800);
                    return;
                }

                // Tenta API Clipboard moderna
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(currentKey).then(() => {
                        showCopiedFeedback();
                    }).catch(() => {
                        fallbackCopyTextToClipboard(currentKey);
                    });
                } else {
                    // Fallback para ambientes não seguros ou navegadores antigos
                    fallbackCopyTextToClipboard(currentKey);
                }
            };

            // Fallback usando textarea (funciona em qualquer lugar)
            function fallbackCopyTextToClipboard(text) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                
                // Torna invisível mas funcional
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                textArea.style.top = "-9999px";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                
                textArea.focus();
                textArea.select();

                let success = false;
                try {
                    success = document.execCommand('copy');
                } catch (err) {
                    console.error('Fallback copy error:', err);
                }

                document.body.removeChild(textArea);

                if (success) {
                    showCopiedFeedback();
                } else {
                    // Último recurso: exibir em prompt
                    alert('Copie manualmente: ' + text);
                }
            }

            function showCopiedFeedback() {
                copyIcon.textContent = '✅';
                copyText.textContent = 'Copiado!';
                btnCopy.classList.add('copied');

                if (copyTimeout) clearTimeout(copyTimeout);
                copyTimeout = setTimeout(() => {
                    resetCopyButton();
                }, 2000);
            }

            function resetCopyButton() {
                copyIcon.textContent = '📋';
                copyText.textContent = 'Copiar';
                btnCopy.classList.remove('copied');
                if (copyTimeout) {
                    clearTimeout(copyTimeout);
                    copyTimeout = null;
                }
            }

            // Inicialização: garantir que o display esteja pronto
            // (Opcional: não gerar nada automaticamente)
        })();
    </script>
</body>
</html>
